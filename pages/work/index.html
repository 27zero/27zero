<script>
/* Nav: sticky white → purple pill on scroll */
(function(){
  var header = document.getElementById('site-header');
  if(!header) return;
  function tick(){ header.classList.toggle('nav-scrolled', window.scrollY > 60); }
  window.addEventListener('scroll', tick, {passive:true});
  tick();
}());

/* Mobile menu */
(function(){
  var burger = document.getElementById('nav-burger-btn');
  var menu   = document.getElementById('mobile-nav-menu');
  var close  = document.getElementById('mobile-close-btn');
  if(!burger||!menu||!close) return;
  function open(){
    menu.classList.add('is-open');
    document.body.style.overflow='hidden';
    burger.setAttribute('aria-expanded','true');
    close.focus();
  }
  function shut(){
    menu.classList.remove('is-open');
    document.body.style.overflow='';
    burger.setAttribute('aria-expanded','false');
    burger.focus();
  }
  burger.addEventListener('click', open);
  close.addEventListener('click', shut);
  menu.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', shut); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') shut(); });
}());

/* Scroll reveal */
(function(){
  var rm = window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var sel = '.pcard,.ditem,.look-item,.client-card,.apart-col,.mitem,.subitem,.cycle-step,.sec-head,.mentor-card-item,.work-card,.testi-slide';
  var els = document.querySelectorAll(sel);
  if(rm||!('IntersectionObserver' in window)){
    els.forEach(function(el){ el.classList.add('reveal-init','in-view'); });
    return;
  }
  els.forEach(function(el){ el.classList.add('reveal-init'); });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){ entry.target.classList.add('in-view'); io.unobserve(entry.target); }
    });
  },{threshold:0.12, rootMargin:'0px 0px -40px 0px'});
  els.forEach(function(el){ io.observe(el); });
}());
</script>

<script>
/**
 * Work index — client-side category filtering.
 *
 * All content is rendered server-side by Python/Jinja.
 * This script only handles show/hide interactions.
 * No arrays. No data. Pure DOM manipulation.
 */
(function () {
  'use strict';

  var filterBtns = document.querySelectorAll('[data-filter]');
  var cards      = document.querySelectorAll('[data-category]');
  var emptyState = document.getElementById('work-empty-state');

  if (!filterBtns.length || !cards.length) return;

  function setFilter(value) {
    // Update button states.
    filterBtns.forEach(function (btn) {
      var active = btn.dataset.filter === value;
      btn.classList.toggle('work-filter-btn--active', active);
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
    });

    // Show / hide cards.
    var visible = 0;
    cards.forEach(function (card) {
      var match = value === 'all' || card.dataset.category === value;
      card.hidden = !match;
      if (match) visible += 1;
    });

    // Show empty-state if nothing visible.
    if (emptyState) {
      emptyState.hidden = visible > 0;
    }

    // Restore feature-first layout when showing all.
    // The CSS .dgrid.feature-first rule targets :first-child,
    // but when cards are hidden the DOM order doesn't change —
    // we just need to ensure the first *visible* card gets the class.
    var grid = document.getElementById('work-cards-grid');
    if (grid) {
      var visibleCards = Array.from(cards).filter(function (c) { return !c.hidden; });
      Array.from(cards).forEach(function (c) { c.classList.remove('work-card--first'); });
      if (visibleCards.length > 0 && value === 'all') {
        visibleCards[0].classList.add('work-card--first');
      }
    }
  }

  filterBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      setFilter(btn.dataset.filter);
    });
  });

  // Keyboard support for the tab role.
  filterBtns.forEach(function (btn, idx) {
    btn.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') {
        filterBtns[(idx + 1) % filterBtns.length].focus();
      } else if (e.key === 'ArrowLeft') {
        filterBtns[(idx - 1 + filterBtns.length) % filterBtns.length].focus();
      }
    });
  });

  // Mark initial first visible card for CSS.
  setFilter('all');
}());
</script>
