<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}27zero — EdTech Marketing Agency{% endblock %}</title>
{% block meta %}{% endblock %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header class="site">
  <div class="navrow">
    <a href="/" class="logo-mark-link" aria-label="27zero — home">
      <img src="/assets/images/27zero-logo.svg" alt="27zero" class="logo-mark">
    </a>
    <nav class="links">
      <a href="/work">Work</a>
      <a href="/edtech-marketing-agency"{% if nav_current == 'marketing' %} class="current"{% endif %}>EdTech Marketing</a>
      <a href="/edtech-mentor-interviews">The EdTech Mentor</a>
      <a href="/resources">Resources</a>
      <a href="/about">About</a>
    </nav>
    <a href="/lets-talk" class="navcta">Let's Talk!</a>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site">
  <div class="wrap">
    <span>© 2026 27zero. All rights reserved.</span>
    <span>Bogotá, Colombia · Granville, OH</span>
  </div>
</footer>

<script>
(function(){
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var targets = document.querySelectorAll(
    '.pcard, .ditem, .look-item, .client-card, .apart-col, .mitem, .subitem, .cycle-step, .sec-head'
  );
  if (reduceMotion || !('IntersectionObserver' in window)) {
    targets.forEach(function(el){ el.classList.add('reveal-init', 'in-view'); });
    return;
  }
  targets.forEach(function(el){ el.classList.add('reveal-init'); });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  targets.forEach(function(el){ io.observe(el); });
})();
</script>

</body>
</html>
